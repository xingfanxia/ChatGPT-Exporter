<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>ChatGPT Exporter</title>
    <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
    <main>
        <h1>ChatGPT Exporter</h1>
        <section id="schedule-state">
            <p id="next-run">计划状态加载中...</p>
            <p id="reminder-note" class="note"></p>
        </section>
        <div class="actions">
            <button id="export-current-btn" disabled>导出当前对话</button>
            <button id="open-dialog-btn">批量导出…</button>
        </div>
        <p class="hint" id="hint">请先打开 chatgpt.com，再导出</p>
        <footer>
            <button id="open-options-btn" class="link-btn">打开设置</button>
        </footer>
    </main>
    <script type="module" src="popup.js"></script>
</body>
</html>
